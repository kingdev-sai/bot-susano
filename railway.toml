[build]
builder = "NIXPACKS"

[build.env]
NODE_VERSION = "20"
NODE_ENV = "production"

[deploy]
startCommand = "node Main.js"
restartPolicyType = "ALWAYS"
restartPolicyMaxRetries = 10
healthcheckPath = "/api/status"
healthcheckTimeout = 60

[phases.install]
cmds = ["npm install --production=false"]

[phases.build]
cmds = ["echo Build complete"]
